[cli]
installer = "internal"

[model.xai-grok-build]
model = "grok-build-0.1"
base_url = "https://api.x.ai/v1"
name = "xAI Grok Build"
env_key = "XAI_API_KEY"

[ui]
# Follow OS light/dark; Grok polls every ~5s on macOS/Linux.
theme = "auto"
auto_dark_theme = "groknight"
auto_light_theme = "grokday"
max_thoughts_width = 120
fork_secondary_model = "grok-build"
yolo = false
compact_mode = false
# Prompt before tool calls.
# Grok auto-approves read-only git/rg/etc. anyway.
permission_mode = "ask"

[sandbox]
# Custom profile in ~/.grok/sandbox.toml (extends workspace + ~/github writes).
profile = "personal"

[permission]
# Deny has highest priority
deny = []

allow = [
  # agent-plain: ANSI wrapper for noisy CLIs (see agents/skills/agent-plain).
  # Prefix-only — broader rules bypass gh/curl/etc. deny rules.
  "Bash(agent-plain cargo build)",
  "Bash(agent-plain cargo check)",
  "Bash(agent-plain cargo check *)",
  "Bash(agent-plain cargo clippy)",
  "Bash(agent-plain cargo test)",
  "Bash(agent-plain devenv shell)",
  "Bash(agent-plain devenv test)",
  "Bash(agent-plain gh pr view)",
  "Bash(agent-plain gh pr view *)",
  # gh: read-only subcommands only (deny api + mutating pr above).
  "Bash(bat *)",
  "Bash(cargo build)",
  "Bash(cargo check)",
  "Bash(cargo check *)",
  "Bash(cargo clippy)",
  "Bash(cargo test)",
  "Bash(cat *)",
  "Bash(cd *)",
  "Bash(direnv exec *)",
  "Bash(direnv status)",
  "Bash(echo *)",
  "Bash(eza *)",
  "Bash(gh auth status)",
  "Bash(gh pr checks *)",
  "Bash(gh pr diff *)",
  "Bash(gh pr list *)",
  "Bash(gh pr status *)",
  "Bash(gh pr view *)",
  "Bash(gh repo view *)",
  # allow read-only git only
  "Bash(git branch *)",
  "Bash(git branch)",
  "Bash(git diff *)",
  "Bash(git log *)",
  "Bash(git ls-files *)",
  "Bash(git remote -v)",
  "Bash(git rev-parse *)",
  "Bash(git show *)",
  "Bash(git status *)",
  "Bash(git status)",
  "Bash(head *)",
  "Bash(jq *)",
  "Bash(just build)",
  "Bash(just fmt)",
  "Bash(ls)",
  "Bash(ls *)",
  "Bash(nix build *)",
  "Bash(nix develop *)",
  "Bash(nix eval *)",
  "Bash(nix flake check *)",
  "Bash(nix flake metadata *)",
  "Bash(nix flake show *)",
  "Bash(nix path-info *)",
  "Bash(nix profile list)",
  "Bash(nix search *)",
  "Bash(printf *)",
  "Bash(rg *)",
  "Bash(sort)",
  "Bash(sort *)",
  "Bash(true)",
  "Bash(tail *)",
  "Bash(which *)",
  "Grep",
  "Read",
]

ask = ["Bash(just switch)", "Bash(just apply)"]

[marketplace]
official_marketplace_auto_installed = true

[[marketplace.sources]]
name = "xAI Official"
git = "https://github.com/xai-org/plugin-marketplace.git"
